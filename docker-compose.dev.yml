services:

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - expense-network
    depends_on:
      - backend
    ports:
      - "5173:5173"
    restart: unless-stopped

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/usr/src/app
    env_file:
      - ./backend/.env
    environment:
      - POSTGRES_HOST=postgres-db
    networks:
      - expense-network
    depends_on:
      postgres-db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
           python manage.py runserver 0.0.0.0:8000"

  postgres-db:
    image: postgres:16
    environment:
      - POSTGRES_DB=expense_tracker
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - expense-network
    restart: unless-stopped

networks:
  expense-network:

volumes:
  postgres_data: